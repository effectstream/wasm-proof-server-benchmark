<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZK Proof Benchmark</title>
  <script src="/tailwind.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-white mb-1">ZK Proof Benchmark</h1>
      <p class="text-gray-400 text-sm">
        Measures browser-side proof generation time per circuit using
        <span class="text-indigo-400">@paima/midnight-wasm-prover</span>.
        Circuits range from K=5 (trivial) to K=17 (complex hash chains).
      </p>
    </div>

    <!-- Status bar -->
    <div id="status-bar" class="mb-6 flex items-center gap-3">
      <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-600"></div>
      <span id="status-text" class="text-gray-400 text-sm">Initializing WASM prover…</span>
    </div>

    <!-- Controls -->
    <div class="mb-6 flex items-center gap-4">
      <button
        id="btn-run"
        disabled
        class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold text-sm transition-colors"
        onclick="startBenchmark()"
      >
        Run Benchmark
      </button>
      <button
        id="btn-reset"
        class="px-4 py-2 rounded-lg border border-gray-700 hover:border-gray-500 text-gray-300 text-sm transition-colors hidden"
        onclick="resetBenchmark()"
      >
        Reset
      </button>
      <span id="thread-info" class="text-gray-500 text-xs"></span>
    </div>

    <!-- Results table -->
    <div class="rounded-xl border border-gray-800 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-900 text-gray-400 text-xs uppercase tracking-wider">
            <th class="text-left px-5 py-3 w-1/3">Circuit</th>
            <th class="text-left px-5 py-3 w-1/4">Description</th>
            <th class="text-center px-5 py-3 w-1/6">Status</th>
            <th class="text-right px-5 py-3 w-1/4">Proof Time</th>
          </tr>
        </thead>
        <tbody id="results-body" class="divide-y divide-gray-800/60">
        </tbody>
      </table>
    </div>

    <!-- Summary -->
    <div id="summary" class="mt-5 hidden p-4 rounded-xl bg-gray-900 border border-gray-800">
      <div class="flex justify-between items-center text-sm">
        <span class="text-gray-400">Total proof time</span>
        <span id="summary-total" class="text-white font-semibold"></span>
      </div>
      <div class="flex justify-between items-center text-sm mt-1">
        <span class="text-gray-400">Circuits completed</span>
        <span id="summary-count" class="text-white font-semibold"></span>
      </div>
    </div>

  </div>

  <script>
    const CIRCUITS = [
      { id: "test_k5",  desc: "1 increment" },
      { id: "test_k6",  desc: "4 increments" },
      { id: "test_k7",  desc: "8 increments" },
      { id: "test_k8",  desc: "32 increments" },
      { id: "test_k9",  desc: "64 increments" },
      { id: "test_k10", desc: "128 increments" },
      { id: "test_k11", desc: "256 increments" },
      { id: "test_k12", desc: "512 increments" },
      { id: "test_k13", desc: "1 hash" },
      { id: "test_k14", desc: "5 hashes" },
      { id: "test_k15", desc: "16 hashes" },
      { id: "test_k16", desc: "32 hashes" },
      { id: "test_k17", desc: "64 hashes" },
    ];

    let worker = null;
    let currentIndex = 0;
    let results = {};
    let running = false;

    function fmt(ms) {
      if (ms < 1000) return `${ms.toFixed(0)} ms`;
      return `${(ms / 1000).toFixed(2)} s`;
    }

    function buildTable() {
      const tbody = document.getElementById("results-body");
      tbody.innerHTML = CIRCUITS.map(({ id, desc }) => `
        <tr id="row-${id}" class="hover:bg-gray-900/50 transition-colors">
          <td class="px-5 py-3 text-indigo-300 font-semibold">${id}</td>
          <td class="px-5 py-3 text-gray-500 text-xs">${desc}</td>
          <td class="px-5 py-3 text-center">
            <span id="status-${id}" class="text-gray-600 text-xs">pending</span>
          </td>
          <td class="px-5 py-3 text-right">
            <span id="time-${id}" class="text-gray-600">—</span>
          </td>
        </tr>
      `).join("");
    }

    function setStatus(msg, color = "gray") {
      document.getElementById("status-text").textContent = msg;
      const colors = { gray: "bg-gray-600", green: "bg-green-500", yellow: "bg-yellow-400", red: "bg-red-500" };
      const dot = document.getElementById("status-dot");
      dot.className = `w-2.5 h-2.5 rounded-full ${colors[color] ?? colors.gray}`;
    }

    function setRowRunning(id) {
      document.getElementById(`status-${id}`).innerHTML =
        `<span class="spinner text-indigo-400">⟳</span>`;
      document.getElementById(`time-${id}`).textContent = "…";
      document.getElementById(`row-${id}`).classList.add("bg-gray-900/30");
    }

    function setRowDone(id, ms) {
      document.getElementById(`status-${id}`).innerHTML =
        `<span class="text-green-400">✓</span>`;
      document.getElementById(`time-${id}`).innerHTML =
        `<span class="text-green-300 font-semibold">${fmt(ms)}</span>`;
      document.getElementById(`row-${id}`).classList.remove("bg-gray-900/30");
    }

    function setRowError(id, msg) {
      document.getElementById(`status-${id}`).innerHTML =
        `<span class="text-red-400">✗</span>`;
      document.getElementById(`time-${id}`).innerHTML =
        `<span class="text-red-400 text-xs truncate" title="${msg}">${msg.slice(0, 40)}</span>`;
      document.getElementById(`row-${id}`).classList.remove("bg-gray-900/30");
    }

    function setRowSkipped(id) {
      document.getElementById(`status-${id}`).innerHTML =
        `<span class="text-gray-500">—</span>`;
      document.getElementById(`time-${id}`).innerHTML =
        `<span class="text-gray-600 text-xs">no BLS params</span>`;
      document.getElementById(`row-${id}`).classList.remove("bg-gray-900/30");
    }

    function startNext() {
      if (currentIndex >= CIRCUITS.length) {
        finishBenchmark();
        return;
      }
      const circuit = CIRCUITS[currentIndex++];
      setStatus(`Proving ${circuit.id}… (${currentIndex}/${CIRCUITS.length})`, "yellow");
      setRowRunning(circuit.id);
      worker.postMessage({ type: "prove", circuitId: circuit.id });
    }

    function finishBenchmark() {
      running = false;
      document.getElementById("btn-run").disabled = false;
      document.getElementById("btn-reset").classList.remove("hidden");

      const attempted = Object.values(results).filter(r => !r.skipped);
      const total = attempted.filter(r => r.ok).reduce((sum, r) => sum + r.ms, 0);
      const ok = attempted.filter(r => r.ok).length;
      const skipped = Object.values(results).filter(r => r.skipped).length;
      const attempted_count = CIRCUITS.length - skipped;

      document.getElementById("summary-total").textContent = fmt(total);
      document.getElementById("summary-count").textContent =
        skipped > 0
          ? `${ok} / ${attempted_count} proved, ${skipped} skipped (missing BLS params)`
          : `${ok} / ${attempted_count}`;
      document.getElementById("summary").classList.remove("hidden");

      setStatus(`Complete — ${ok}/${total_circuits} circuits proved`, "green");
    }

    function startBenchmark() {
      if (running) return;
      running = true;
      currentIndex = 0;
      results = {};
      document.getElementById("btn-run").disabled = true;
      document.getElementById("btn-reset").classList.add("hidden");
      document.getElementById("summary").classList.add("hidden");
      buildTable();
      setStatus("Starting benchmark…", "yellow");
      startNext();
    }

    function resetBenchmark() {
      buildTable();
      document.getElementById("summary").classList.add("hidden");
      document.getElementById("btn-reset").classList.add("hidden");
      setStatus("Ready — click Run Benchmark to start", "green");
    }

    function initWorker() {
      worker = new Worker("/worker.js", { type: "module" });

      worker.onmessage = ({ data }) => {
        switch (data.type) {
          case "ready":
            setStatus("Ready — click Run Benchmark to start", "green");
            document.getElementById("btn-run").disabled = false;
            if (data.threads) {
              document.getElementById("thread-info").textContent =
                `${data.threads} thread${data.threads > 1 ? "s" : ""}`;
            }
            break;

          case "result":
            results[data.circuitId] = { ms: data.ms, ok: true };
            setRowDone(data.circuitId, data.ms);
            startNext();
            break;

          case "error":
            results[data.circuitId] = { ms: 0, ok: false };
            setRowError(data.circuitId, data.message);
            startNext();
            break;

          case "skipped":
            results[data.circuitId] = { ms: null, ok: false, skipped: true };
            setRowSkipped(data.circuitId);
            startNext();
            break;

          case "init-error":
            setStatus(`Prover init failed: ${data.message}`, "red");
            break;
        }
      };

      worker.onerror = (e) => {
        setStatus(`Worker error: ${e.message}`, "red");
      };
    }

    // Bootstrap
    buildTable();
    initWorker();
  </script>

</body>
</html>
